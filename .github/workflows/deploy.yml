name: Deploy VITE App to EC2 with PM2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }} "echo 'SSH connection successful'"

      - name: Deploy with PM2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }} << 'EOF'
            cd /home/azureuser/

            echo "🔀 Switching branch and pulling latest..."
            git clone ${{ github.repositoryUrl }} .

            cd /home/azureuser/hello-world
            echo "📦 Installing dependencies..."
            npm install

            echo "🛠 Building app..."
            npm run build

            echo "🚀 Restarting PM2 process..."
            pm2 start server.js --name hello-world-node || pm2 restart 

            echo "💾 Saving PM2 process list..."
            pm2 save

            echo "🎉 Deployment successful"
          EOF