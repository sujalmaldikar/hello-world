name: Deploy Node App to EC2 with PM2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Test SSH Connection
        run: ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo 'SSH connection successful'"

      - name: Deploy with PM2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s << EOF
            set -e

            # Navigate to deploy directory
            mkdir -p /home/${{ secrets.SERVER_USER }}/hello-world
            cd /home/${{ secrets.SERVER_USER }}/hello-world

            # Install dependencies
            npm install

            # Build (if you have build step, optional)
            # npm run build

            # Restart or start PM2
            pm2 start server.js --name hello-world-node || pm2 restart hello-world-node
            pm2 save

            echo "🎉 Deployment successful"
          EOF